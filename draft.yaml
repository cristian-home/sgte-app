# SGTE - Draft Blueprint
# Sistema de Gestión de Transporte Especial
# Modelo de datos v1.2 - Incluye relaciones hasMany y hasOne

# ORDEN DE ENTIDADES (importante para migraciones):
# 1. Catalogs primero (no dependen de nadie)
# 2. Master data (dependen de catalogs)
# 3. Billing (Invoice antes de Service)
# 4. Operational (Service depende de Invoice, Contract, Vehicle, Driver)
# 5. Documents (Fuec depende de Service)
# 6. GPS (VehicleLocation depende de Vehicle)

models:

  # ============================================
  # 1. CATALOGS (sin dependencias)
  # ============================================

  DocumentType:
    code: string:10
    name: string:100
    is_natural_person: boolean default:true
    is_legal_person: boolean default:true
    timestamps: true
    softdeletes: true
    relationships:
      hasMany: ThirdParty, Driver

  Eps:
    code: string:10
    name: string:100
    timestamps: true
    softdeletes: true
    relationships:
      hasMany: Driver

  PensionFund:
    code: string:10
    name: string:100
    timestamps: true
    softdeletes: true
    relationships:
      hasMany: Driver

  SeveranceFund:
    code: string:10
    name: string:100
    timestamps: true
    softdeletes: true
    relationships:
      hasMany: Driver

  # ============================================
  # 2. MASTER DATA (dependen de DocumentType)
  # ============================================

  ThirdParty:
    document_type_id: id foreign:document_types
    identification_number: string:50
    is_natural_person: boolean default:true
    first_name: string:100 nullable
    second_name: string:100 nullable
    first_lastname: string:100 nullable
    second_lastname: string:100 nullable
    company_name: string:200 nullable
    trade_name: string:200 nullable
    city: string:100
    address: string:255
    phone: string:50
    email: string:255
    is_customer: boolean default:false
    is_provider: boolean default:false
    active: boolean default:true
    timestamps: true
    softdeletes: true
    relationships:
      belongsTo: DocumentType
      hasMany: Vehicle, Contract

  Driver:
    document_type_id: id foreign:document_types
    identification_number: string:50
    first_name: string:100
    second_name: string:100 nullable
    first_lastname: string:100
    second_lastname: string:100 nullable
    city: string:100
    address: string:255
    phone: string:50
    email: string:255
    license_category: string:10
    license_due_date: date
    eps_id: id foreign:eps
    pension_fund_id: id foreign:pension_funds
    severance_fund_id: id foreign:severance_funds
    has_social_security: boolean default:true
    active: boolean default:true
    timestamps: true
    softdeletes: true
    relationships:
      belongsTo: DocumentType, Eps, PensionFund, SeveranceFund
      hasMany: Service

  # ============================================
  # 3. VEHICLE (depende de ThirdParty)
  # ============================================

  Vehicle:
    internal_code: string:20
    plate: string:6
    mobile_number: string:20
    brand: string:50
    line: string:50
    model_year: integer
    type: enum:bus,buseta,van,automobile
    engine_number: string:50
    chassis_number: string:50
    capacity: integer
    city: string:100
    is_third_party: boolean default:false
    third_party_id: id foreign:third_parties nullable
    soat_due_date: date
    rtm_due_date: date
    operation_card_due_date: date
    status: enum:active,maintenance,retired default:active
    timestamps: true
    softdeletes: true
    relationships:
      belongsTo: ThirdParty
      hasMany: Service, VehicleLocation

  # ============================================
  # 4. CONTRACT (depende de ThirdParty)
  # ============================================

  Contract:
    contract_number: string:50
    third_party_id: id foreign:third_parties
    contract_object: enum:business,tourism,health,occasional
    start_date: date
    end_date: date
    route_description: text
    is_generic: boolean default:false
    active: boolean default:true
    timestamps: true
    softdeletes: true
    relationships:
      belongsTo: ThirdParty
      hasMany: Service

  # ============================================
  # 5. BILLING (Invoice antes de Service para FK)
  # ============================================

  Invoice:
    invoice_number: string:50 unique
    total_value: decimal:12,2 default:0
    issue_date: date
    payment_status: enum:pending,paid,overdue default:pending
    notes: text nullable
    timestamps: true
    softdeletes: true
    relationships:
      hasMany: Service

  # ============================================
  # 6. OPERATIONAL
  # ============================================

  DayStatus:
    date: date unique
    status: enum:projected,executed default:projected
    executor_id: id foreign:users nullable
    executed_at: timestamp nullable
    timestamps: true

  Service:
    contract_id: id foreign:contracts
    vehicle_id: id foreign:vehicles
    driver_id: id foreign:drivers nullable
    invoice_id: id foreign:invoices nullable
    service_date: date
    origin: string:255
    destination: string:255
    planned_start_time: time
    planned_duration: integer
    actual_start_time: time nullable
    actual_end_time: time nullable
    unit_value: decimal:12,2
    quantity: integer default:1
    billing_group: string:50 nullable
    payment_method: enum:cash,credit,transfer default:credit
    service_status: enum:open,closed default:open
    timestamps: true
    softdeletes: true
    relationships:
      belongsTo: Contract, Vehicle, Driver, Invoice
      hasMany: ServiceIncident
      hasOne: Fuec

  ServiceIncident:
    service_id: id foreign:services
    incident_type: enum:delay,accident,breakdown,traffic,weather,customer_no_show,other
    description: text
    registrar_id: id foreign:users
    is_driver_report: boolean default:false
    reported_at: timestamp
    affects_billing: boolean default:false
    additional_value: decimal:12,2 nullable
    timestamps: true
    relationships:
      belongsTo: Service

  # ============================================
  # 7. DOCUMENTS (Fuec depende de Service)
  # ============================================

  Fuec:
    service_id: id foreign:services
    consecutive_number: integer
    generated_at: timestamp
    qr_code: string:255
    status: enum:active,cancelled default:active
    pdf_url: string:500 nullable
    timestamps: true
    relationships:
      belongsTo: Service

  # ============================================
  # 8. GPS (VehicleLocation depende de Vehicle)
  # ============================================

  VehicleLocation:
    vehicle_id: id foreign:vehicles
    recorded_at: timestamp
    latitude: decimal:10,8
    longitude: decimal:11,8
    is_manual: boolean default:false
    timestamps: true
    relationships:
      belongsTo: Vehicle

seeders: DocumentType, Eps, PensionFund, SeveranceFund, ThirdParty, Driver, Vehicle, Contract, Invoice, DayStatus, Service, ServiceIncident, Fuec, VehicleLocation

controllers:

  # ============================================
  # CATALOGS
  # ============================================

  DocumentType:
    index:
      query: all
      inertia: document-types/index with:documentTypes
    create:
      inertia: document-types/create
    store:
      validate: code, name, is_natural_person, is_legal_person
      save: documentType
      redirect: document-types.index
    show:
      inertia: document-types/show with:documentType
    edit:
      inertia: document-types/edit with:documentType
    update:
      validate: code, name, is_natural_person, is_legal_person
      update: documentType
      redirect: document-types.index
    destroy:
      delete: documentType
      redirect: document-types.index

  Eps:
    index:
      query: all
      inertia: eps/index with:eps
    create:
      inertia: eps/create
    store:
      validate: code, name
      save: eps
      redirect: eps.index
    show:
      inertia: eps/show with:eps
    edit:
      inertia: eps/edit with:eps
    update:
      validate: code, name
      update: eps
      redirect: eps.index
    destroy:
      delete: eps
      redirect: eps.index

  PensionFund:
    index:
      query: all
      inertia: pension-funds/index with:pensionFunds
    create:
      inertia: pension-funds/create
    store:
      validate: code, name
      save: pensionFund
      redirect: pension-funds.index
    show:
      inertia: pension-funds/show with:pensionFund
    edit:
      inertia: pension-funds/edit with:pensionFund
    update:
      validate: code, name
      update: pensionFund
      redirect: pension-funds.index
    destroy:
      delete: pensionFund
      redirect: pension-funds.index

  SeveranceFund:
    index:
      query: all
      inertia: severance-funds/index with:severanceFunds
    create:
      inertia: severance-funds/create
    store:
      validate: code, name
      save: severanceFund
      redirect: severance-funds.index
    show:
      inertia: severance-funds/show with:severanceFund
    edit:
      inertia: severance-funds/edit with:severanceFund
    update:
      validate: code, name
      update: severanceFund
      redirect: severance-funds.index
    destroy:
      delete: severanceFund
      redirect: severance-funds.index

  # ============================================
  # MASTER DATA
  # ============================================

  ThirdParty:
    index:
      query: all
      inertia: third-parties/index with:thirdParties
    create:
      inertia: third-parties/create
    store:
      validate: document_type_id, identification_number, is_natural_person, first_name, second_name, first_lastname, second_lastname, company_name, trade_name, city, address, phone, email, is_customer, is_provider, active
      save: thirdParty
      redirect: third-parties.index
    show:
      inertia: third-parties/show with:thirdParty
    edit:
      inertia: third-parties/edit with:thirdParty
    update:
      validate: document_type_id, identification_number, is_natural_person, first_name, second_name, first_lastname, second_lastname, company_name, trade_name, city, address, phone, email, is_customer, is_provider, active
      update: thirdParty
      redirect: third-parties.index
    destroy:
      delete: thirdParty
      redirect: third-parties.index

  Driver:
    index:
      query: all
      inertia: drivers/index with:drivers
    create:
      inertia: drivers/create
    store:
      validate: document_type_id, identification_number, first_name, second_name, first_lastname, second_lastname, city, address, phone, email, license_category, license_due_date, eps_id, pension_fund_id, severance_fund_id, has_social_security, active
      save: driver
      redirect: drivers.index
    show:
      inertia: drivers/show with:driver
    edit:
      inertia: drivers/edit with:driver
    update:
      validate: document_type_id, identification_number, first_name, second_name, first_lastname, second_lastname, city, address, phone, email, license_category, license_due_date, eps_id, pension_fund_id, severance_fund_id, has_social_security, active
      update: driver
      redirect: drivers.index
    destroy:
      delete: driver
      redirect: drivers.index

  Vehicle:
    index:
      query: all
      inertia: vehicles/index with:vehicles
    create:
      inertia: vehicles/create
    store:
      validate: internal_code, plate, mobile_number, brand, line, model_year, type, engine_number, chassis_number, capacity, city, is_third_party, third_party_id, soat_due_date, rtm_due_date, operation_card_due_date, status
      save: vehicle
      redirect: vehicles.index
    show:
      inertia: vehicles/show with:vehicle
    edit:
      inertia: vehicles/edit with:vehicle
    update:
      validate: internal_code, plate, mobile_number, brand, line, model_year, type, engine_number, chassis_number, capacity, city, is_third_party, third_party_id, soat_due_date, rtm_due_date, operation_card_due_date, status
      update: vehicle
      redirect: vehicles.index
    destroy:
      delete: vehicle
      redirect: vehicles.index

  Contract:
    index:
      query: all
      inertia: contracts/index with:contracts
    create:
      inertia: contracts/create
    store:
      validate: contract_number, third_party_id, contract_object, start_date, end_date, route_description, is_generic, active
      save: contract
      redirect: contracts.index
    show:
      inertia: contracts/show with:contract
    edit:
      inertia: contracts/edit with:contract
    update:
      validate: contract_number, third_party_id, contract_object, start_date, end_date, route_description, is_generic, active
      update: contract
      redirect: contracts.index
    destroy:
      delete: contract
      redirect: contracts.index

  # ============================================
  # BILLING
  # ============================================

  Invoice:
    index:
      query: all
      inertia: invoices/index with:invoices
    create:
      inertia: invoices/create
    store:
      validate: invoice_number, total_value, issue_date, payment_status, notes
      save: invoice
      redirect: invoices.index
    show:
      inertia: invoices/show with:invoice
    edit:
      inertia: invoices/edit with:invoice
    update:
      validate: invoice_number, total_value, issue_date, payment_status, notes
      update: invoice
      redirect: invoices.index
    destroy:
      delete: invoice
      redirect: invoices.index

  # ============================================
  # OPERATIONAL
  # ============================================

  DayStatus:
    index:
      query: all
      inertia: day-statuses/index with:dayStatuses
    create:
      inertia: day-statuses/create
    store:
      validate: date, status, executor_id, executed_at
      save: dayStatus
      redirect: day-statuses.index
    show:
      inertia: day-statuses/show with:dayStatus
    edit:
      inertia: day-statuses/edit with:dayStatus
    update:
      validate: date, status, executor_id, executed_at
      update: dayStatus
      redirect: day-statuses.index
    destroy:
      delete: dayStatus
      redirect: day-statuses.index

  Service:
    index:
      query: all
      inertia: services/index with:services
    create:
      inertia: services/create
    store:
      validate: contract_id, vehicle_id, driver_id, invoice_id, service_date, origin, destination, planned_start_time, planned_duration, actual_start_time, actual_end_time, unit_value, quantity, billing_group, payment_method, service_status
      save: service
      redirect: services.index
    show:
      inertia: services/show with:service
    edit:
      inertia: services/edit with:service
    update:
      validate: contract_id, vehicle_id, driver_id, invoice_id, service_date, origin, destination, planned_start_time, planned_duration, actual_start_time, actual_end_time, unit_value, quantity, billing_group, payment_method, service_status
      update: service
      redirect: services.index
    destroy:
      delete: service
      redirect: services.index

  ServiceIncident:
    index:
      query: all
      inertia: service-incidents/index with:serviceIncidents
    create:
      inertia: service-incidents/create
    store:
      validate: service_id, incident_type, description, registrar_id, is_driver_report, reported_at, affects_billing, additional_value
      save: serviceIncident
      redirect: service-incidents.index
    show:
      inertia: service-incidents/show with:serviceIncident
    edit:
      inertia: service-incidents/edit with:serviceIncident
    update:
      validate: service_id, incident_type, description, registrar_id, is_driver_report, reported_at, affects_billing, additional_value
      update: serviceIncident
      redirect: service-incidents.index
    destroy:
      delete: serviceIncident
      redirect: service-incidents.index

  # ============================================
  # DOCUMENTS
  # ============================================

  Fuec:
    index:
      query: all
      inertia: fuecs/index with:fuecs
    create:
      inertia: fuecs/create
    store:
      validate: service_id, consecutive_number, generated_at, qr_code, status, pdf_url
      save: fuec
      redirect: fuecs.index
    show:
      inertia: fuecs/show with:fuec
    edit:
      inertia: fuecs/edit with:fuec
    update:
      validate: service_id, consecutive_number, generated_at, qr_code, status, pdf_url
      update: fuec
      redirect: fuecs.index
    destroy:
      delete: fuec
      redirect: fuecs.index

  # ============================================
  # GPS
  # ============================================

  VehicleLocation:
    index:
      query: all
      inertia: vehicle-locations/index with:vehicleLocations
    create:
      inertia: vehicle-locations/create
    store:
      validate: vehicle_id, recorded_at, latitude, longitude, is_manual
      save: vehicleLocation
      redirect: vehicle-locations.index
    show:
      inertia: vehicle-locations/show with:vehicleLocation
    edit:
      inertia: vehicle-locations/edit with:vehicleLocation
    update:
      validate: vehicle_id, recorded_at, latitude, longitude, is_manual
      update: vehicleLocation
      redirect: vehicle-locations.index
    destroy:
      delete: vehicleLocation
      redirect: vehicle-locations.index
