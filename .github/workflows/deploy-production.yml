name: deploy-production

# Production deploys are tied to release tags (vX.Y.Z) — every tag push
# fires a deploy at the client's Dokploy. The workflow_dispatch trigger
# is the manual escape hatch for re-deploys without code changes (e.g.,
# after updating an env var in Dokploy).
#
# Dokploy autoDeploy on push to main is DISABLED on this app so commits
# that land on main outside of a release do not reach production.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo del deploy (ej. re-deploy tras cambio de env, hotfix manual)'
        required: false
        default: 'manual'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout (tag push only)
        if: github.event_name == 'push'
        uses: actions/checkout@v4

      - name: Verify VERSION matches tag
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE="$(tr -d '[:space:]' < VERSION)"
          if [ "$TAG" != "$FILE" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} no coincide con VERSION (${FILE}). Bumpea VERSION antes de tagear."
            exit 1
          fi
          echo "VERSION (${FILE}) coincide con el tag (${GITHUB_REF_NAME})."

      - name: Trigger Dokploy production deployment (full build)
        run: |
          # application.deploy = rebuild desde el código (toma ~10 min).
          # NO usamos application.redeploy porque ése sólo reinicia el
          # contenedor con la imagen vieja y no traería el código del tag.
          curl -sSf -X POST "${{ secrets.DOKPLOY_PROD_URL }}/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_PROD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_PROD_APP_ID }}"}'
