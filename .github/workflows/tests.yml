name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Tests
        run: ./vendor/bin/pest

  dusk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        # .env.example pins OPERATION_TZ=UTC + feature flags + SUPER_ADMIN_*
        # so Dusk inherits the same env Pest uses. No separate .env.dusk.*
        # file is needed in CI — `php artisan dusk` falls back to .env when
        # no `.env.dusk.<APP_ENV>` exists.
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Prepare SQLite database
        # Dusk hits a real HTTP server (php artisan serve), so the test
        # connection must be a real file — :memory: from phpunit.xml is
        # process-local and the serve process wouldn't see it.
        run: touch database/database.sqlite

      - name: Build Assets
        run: npm run build

      - name: Install ChromeDriver
        run: php artisan dusk:chrome-driver --detect

      - name: Start ChromeDriver
        run: ./vendor/laravel/dusk/bin/chromedriver-linux --port=9515 &

      - name: Start Web Server
        run: php artisan serve --no-reload &
        env:
          APP_URL: http://127.0.0.1:8000

      - name: Run Dusk Tests
        run: php artisan dusk
        env:
          APP_URL: http://127.0.0.1:8000
          DUSK_DRIVER_URL: http://localhost:9515

      - name: Upload Dusk Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dusk-artifacts
          path: |
            tests/Browser/screenshots/
            tests/Browser/console/
