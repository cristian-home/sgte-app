# =============================================================================
# SGTE Staging Compose — Infrastructure Services
#
# This file provides the infrastructure services for staging/production.
# Dokploy manages the app container separately (see docs/deployment.md).
#
# Local testing (builds and runs the app alongside infrastructure):
#   docker compose -f compose.staging.yaml --profile local --env-file .env.stg up -d --build
#
# Infrastructure only (for Dokploy — paste this file as-is):
#   docker compose -f compose.staging.yaml --env-file .env.stg up -d
# =============================================================================

services:
    app:
      profiles: [local]
      build:
        context: .
        dockerfile: docker/production/Dockerfile
      ports:
        - '${APP_PORT:-8000}:8000'
        - '${REVERB_PORT:-8080}:8080'
      env_file: .env.staging
      networks:
        - sgte
      depends_on:
        pgsql:
          condition: service_healthy
        redis:
          condition: service_healthy
        typesense:
          condition: service_healthy
        minio:
          condition: service_healthy
        mailpit:
          condition: service_started
    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sgte-pgsql:/var/lib/postgresql'
        networks:
            - sgte
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sgte-redis:/data'
        networks:
            - sgte
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    typesense:
        image: 'typesense/typesense:27.1'
        ports:
            - '${FORWARD_TYPESENSE_PORT:-8108}:8108'
        environment:
            TYPESENSE_DATA_DIR: '${TYPESENSE_DATA_DIR:-/typesense-data}'
            TYPESENSE_API_KEY: '${TYPESENSE_API_KEY:-xyz}'
            TYPESENSE_ENABLE_CORS: '${TYPESENSE_ENABLE_CORS:-true}'
        volumes:
            - 'sgte-typesense:/typesense-data'
        networks:
            - sgte
        healthcheck:
            test:
                - CMD
                - bash
                - '-c'
                - 'exec 3<>/dev/tcp/localhost/8108 && printf ''GET /health HTTP/1.1\r\nConnection: close\r\n\r\n'' >&3 && head -n1 <&3 | grep ''200'' && exec 3>&-'
            retries: 5
            timeout: 7s
    minio:
        image: 'minio/minio:latest'
        ports:
            - '${FORWARD_MINIO_PORT:-9000}:9000'
            - '${FORWARD_MINIO_CONSOLE_PORT:-8900}:8900'
        environment:
            MINIO_ROOT_USER: sail
            MINIO_ROOT_PASSWORD: password
        volumes:
            - 'sgte-minio:/data'
        networks:
            - sgte
        command: 'minio server /data --console-address ":8900"'
        healthcheck:
            test:
                - CMD
                - mc
                - ready
                - local
            retries: 3
            timeout: 5s
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sgte
networks:
    sgte:
        driver: bridge
volumes:
    sgte-pgsql:
        driver: local
    sgte-redis:
        driver: local
    sgte-typesense:
        driver: local
    sgte-minio:
        driver: local
